name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - run: bun install

      # 编译全平台二进制
      - name: Build binaries
        run: bun run scripts/build-binaries.ts

      # 生成 npm 包目录
      - name: Prepare npm packages
        run: bun run scripts/prepare-npm-packages.ts

      # 发布 npm 平台包
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            cd dist/npm/$platform
            npm publish --access public
            cd -
          done

      # 发布 npm 主包
      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd dist/npm/main
          npm publish --access public

      # 打包 GitHub Release 产物
      - name: Package release artifacts
        run: |
          mkdir -p dist/release-artifacts
          cd dist/exe

          for dir in */; do
            platform="${dir%/}"
            tar -czvf "../release-artifacts/paimon-${platform}.tar.gz" -C "$platform" bin/paimon web/
          done

          cd ../release-artifacts
          sha256sum * > checksums.txt

      # 生成 Release Notes
      - name: Generate release notes
        run: bun run scripts/generate-release-notes.ts > RELEASE_NOTES.md

      # 创建 GitHub Release
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            --title "Release ${GITHUB_REF#refs/tags/}" \
            --notes-file RELEASE_NOTES.md \
            dist/release-artifacts/*

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Paimon</title>
    <style>
      /* Safe area 兜底色（必须内联，Safari 仅从内联样式读取 safe area 背景） */
      html {
        background-color: #e8f0fe;
      }
      html[data-theme="dark"] {
        background-color: #1a1a2e;
      }
      html[data-bg="aurora"] {
        background-color: #a8d8ea;
      }
      html[data-bg="aurora"][data-theme="dark"] {
        background-color: #0d1b2a;
      }
      html[data-bg="ember"] {
        background-color: #f8d4b0;
      }
      html[data-bg="ember"][data-theme="dark"] {
        background-color: #2e1a0a;
      }
    </style>
  </head>
  <body class="antialiased">
    <script>
      // 防 FOUC：在 React 渲染前同步设置 data-theme 和 data-bg
      (function () {
        var appearance = localStorage.getItem("paimon:appearance") || "system";
        var bg = localStorage.getItem("paimon:background") || "mist";
        var theme;
        if (appearance === "system") {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        } else {
          theme = appearance;
        }
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.setAttribute("data-bg", bg);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>

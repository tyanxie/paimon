name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install

      - name: Type check
        run: bun run tsc --noEmit

      - name: Build frontend
        run: bun run build

      - name: Test
        run: bun test
